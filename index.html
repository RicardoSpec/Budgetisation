<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12466B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Grand livre">
<title>Grand livre — Budget</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ Barre supérieure : menu hamburger + apps ============ -->
<nav class="appbar" aria-label="Navigation des applications">
  <button class="burger" id="burger" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="appmenu">
    <span></span><span></span><span></span>
  </button>
  <span class="appbar__here">Grand livre</span>
  <label for="yearSelect" class="visually-hidden">Choisir l'année</label>
  <select id="yearSelect" class="yearSelect"></select>
  <ul class="appmenu" id="appmenu" hidden>
    <li class="appmenu__title">Mes applications</li>
    <li><a href="https://ricardospec.github.io/coachmuscu/">Coachmuscu</a></li>
    <li><a href="https://ricardospec.github.io/Mouche-Universit-/">Mouche Université</a></li>
    <li><a href="https://ricardospec.github.io/Lateliergram/">L'atelier gram</a></li>
    <li><a href="https://ricardospec.github.io/English-Fly/">English Fly</a></li>
    <li><span class="appmenu__soon">Espagnol — à venir</span></li>
    <li class="appmenu__sep"></li>
    <li><a href="index.html" aria-current="page" class="is-current">Budget</a></li>
  </ul>
</nav>

<!-- ============ Onglets internes ============ -->
<nav class="tabs" aria-label="Sections">
  <button class="tab is-active" data-tab="dashboard">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>Tableau</button>
  <button class="tab" data-tab="month">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>Mois</button>
  <button class="tab" data-tab="portfolio">
    <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/><circle cx="16.5" cy="14.5" r="1"/></svg>Actifs</button>
  <button class="tab" data-tab="charts">
    <svg viewBox="0 0 24 24"><path d="M4 19V5M4 19h16"/><path d="M8 15l3-4 3 2 4-6"/></svg>Courbes</button>
  <button class="tab" data-tab="data">
    <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v14c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 12c0 1.7 3.6 3 8 3s8-1.3 8-3"/></svg>Données</button>
</nav>

<!-- ============ Contenu (rempli par app.js) ============ -->
<main class="page">
  <section class="panel is-active" id="panel-dashboard" aria-label="Tableau de bord"><div data-fill="dashboard"></div></section>
  <section class="panel" id="panel-month" aria-label="Détail du mois"><div data-fill="month"></div></section>
  <section class="panel" id="panel-portfolio" aria-label="Portefeuille"><div data-fill="portfolio"></div></section>
  <section class="panel" id="panel-charts" aria-label="Graphiques"><div data-fill="charts"></div></section>
  <section class="panel" id="panel-data" aria-label="Données"><div data-fill="data"></div></section>
</main>

<footer class="footnote">
  <p>Tes données restent dans ce navigateur. Rien n'est envoyé en ligne. Pense à exporter une sauvegarde globale régulièrement depuis l'onglet « Données ».</p>
</footer>

<!-- Chart.js (utilisé par l'onglet Graphiques) -->
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<!-- Logique de l'app (aucune donnée n'est embarquée dans le dépôt) -->
<script defer src="app.js"></script>

</body>
</html>
